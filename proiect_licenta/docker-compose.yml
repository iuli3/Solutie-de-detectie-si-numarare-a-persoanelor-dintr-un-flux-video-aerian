version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: licenta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: licenta_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: parola_sigura
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: licenta_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: parola_sigura
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    container_name: licenta_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://admin:parola_sigura@postgres:5432/licenta_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: parola_sigura
      MINIO_BUCKET: licenta-videos
      MINIO_SECURE: "False"
      PROCESSING_SERVER_URL: http://10.13.0.105:5001
      FLASK_PORT: "5000"
      FLASK_DEBUG: "false"
    depends_on:
      - postgres
      - minio

  frontend:
    build:
      context: ./frontend/yoloclient
      args:
        VITE_API_URL: http://10.13.20.17:5000
    container_name: licenta_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
