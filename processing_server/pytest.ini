[pytest]
# Pytest configuration for processing_server tests

minversion = 6.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance benchmarks
    mock: tests that use mock models
    real: tests that use real models

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout (seconds)
timeout = 60

# Coverage options
[coverage:run]
branch = True
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
